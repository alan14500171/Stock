version: '3.8'

services:
  # 后端服务
  stock-backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: stock-backend:latest
    container_name: stock-backend
    restart: always
    ports:
      - "9099:9099"
    volumes:
      - ./logs:/app/logs
      - ./config:/app/config
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    network_mode: "bridge"

# 不再需要volumes和networks配置 