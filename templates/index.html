{% extends "base.html" %}

{% block title %}首页{% endblock %}

{% block content %}
<div class="text-center">
    <h1 class="display-4">欢迎使用股票交易记录系统</h1>
    <p class="lead">这是一个简单的股票交易记录管理系统，帮助您追踪港股和美股的交易记录。</p>
    
    {% if not session.get('user_id') %}
    <div class="mt-4">
        <a href="{{ url_for('auth.login') }}" class="btn btn-primary btn-lg mx-2">登录</a>
        <a href="{{ url_for('auth.register') }}" class="btn btn-outline-primary btn-lg mx-2">注册</a>
    </div>
    {% else %}
    <div class="mt-4">
        <a href="{{ url_for('stock.stats') }}" class="btn btn-primary btn-lg mx-2">盈利统计</a>
        <a href="{{ url_for('stock.list') }}" class="btn btn-outline-primary btn-lg mx-2">查看交易记录</a>
    </div>
    {% endif %}
</div>
{% endblock %}
