version: '3'

services:
  # 前端服务 (Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: stock-frontend-nginx
    restart: always
    ports:
      - "80:80"
    environment:
      - TZ=Asia/Shanghai
      - NODE_ENV=production
      - VITE_API_BASE_URL=http://后端实际IP地址:9099
    networks:
      - stock-network

networks:
  stock-network:
    driver: bridge 