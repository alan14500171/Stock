version: '3'

services:
  # 前端服务 (Nginx)
  frontend:
    container_name: stock-frontend-nginx
    build:
      context: .
      dockerfile: Dockerfile.nginx
      args:
        - NODE_ENV=production
    image: stock-frontend-nginx:latest
    restart: always
    environment:
      - NODE_OPTIONS=--max-old-space-size=4096 --no-warnings
      - VITE_API_BASE_URL=http://192.168.0.109:9099
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # 群辉NAS特定配置
    network_mode: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  stock-network:
    driver: bridge 